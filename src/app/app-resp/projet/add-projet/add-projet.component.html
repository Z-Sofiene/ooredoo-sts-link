<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-lg w-full max-w-lg p-6 relative">

    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-semibold flex items-center gap-2">
        <i class="fas fa-plus-circle text-blue-600"></i>
        Ajouter un Projet
      </h1>
      <button (click)="close.emit()" class="text-gray-400 hover:text-gray-600">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Form -->
    <div class="space-y-4">

      <input
        [(ngModel)]="projet.nomProjet"
        placeholder="Nom du projet"
        class="form-input"
      />

      <textarea
        [(ngModel)]="projet.description"
        placeholder="Description"
        class="form-input"
        rows="3"
      ></textarea>

      <input
        type="date"
        [(ngModel)]="projet.date_debut"
        class="form-input"
      />

      <!-- ✅ CASE 1: Operator passed -->
      <div *ngIf="operateur">
        <label class="text-sm text-gray-600">Opérateur</label>
        <input
          class="form-input bg-gray-100"
          [value]="operateur.nomOperateur"
          disabled
        />
      </div>

      <!-- ✅ CASE 2: Operator not passed -->
      <div *ngIf="!operateur">
        <label class="text-sm text-gray-600">Opérateur</label>
        <select
          class="form-input w-full"
          [(ngModel)]="projet.operateur"
          required
        >
          <option [ngValue]="null" disabled>
            -- Choisir un opérateur --
          </option>
          <option *ngFor="let op of operateurs" [ngValue]="op">
            {{ op.nomOperateur }}
          </option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="flex justify-end gap-2 mt-4">
        <button
          class="cancel-btn flex items-center gap-2"
          (click)="close.emit()"
        >
          <i class="fas fa-times"></i> Annuler
        </button>
        <button
          class="submit-btn"
          (click)="addProjet()"
          [disabled]="!projet.nomProjet || !projet.operateur"
        >
          <i class="fas fa-check"></i> Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>
