
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <!-- Modal Card -->
  <div class="bg-white rounded-xl shadow-lg w-full max-w-lg p-6 relative">
    <!-- Modal Header -->
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-2xl font-semibold flex items-center gap-2">
        <i class="fas fa-plus-circle text-blue-600"></i> Ajouter un Operateur
      </h3>
      <button (click)="close.emit()" class="text-gray-400 hover:text-gray-600">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <input
        [(ngModel)]="operateur.nomOperateur"
        placeholder="Nom d'operateur"
        class="form-input"
      />

      <!-- Buttons -->
      <div class="flex justify-end gap-2 mt-2">
        <button
          class="cancel-btn"
          (click)="close.emit()"
        >
          <i class="fas fa-times"></i> Annuler
        </button>
        <button
          class="submit-btn"
          (click)="addOperateur()"
        >
          <i class="fas fa-check"></i> Enregistrer
        </button>
      </div>
    </div>
  </div>


</div>
