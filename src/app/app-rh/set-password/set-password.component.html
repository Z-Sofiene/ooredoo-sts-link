<div class="set-password-body">
  <!-- Bubble Animations Background -->
  <div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="activepassword-card">
    <!-- Logo Section -->
    <div class="logo-container">
      <div class="logo-icon">
        <div class="logo-inner"></div>
        <div class="logo-dot"></div>
      </div>
      <h1 class="logo-text">STSGroupe</h1>
    </div>

    <p class="text-center mb-6 font-medium tracking-wide uppercase">
      Set Your Password
    </p>

    <!-- Login Form -->
    <form *ngIf="form" [formGroup]="form" (ngSubmit)="resetPassword()">
      <div class="form-group">
        <input
          type="password"
          formControlName="password"
          required
          placeholder="Password"
          class="form-input"
          [class.error]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="error-message mt-2">
          Password is required (min 8 characters)
        </div>
      </div>

      <div class="form-group">
        <input
          type="password"
          formControlName="confirmPassword"
          required
          placeholder="Confirm Password"
          class="form-input"
          [class.error]="form.get('confirmPassword')?.invalid && form.get('confirmPassword')?.touched"
        />
        <div *ngIf="form.hasError('mismatch')" class="error-message mt-2">
          Passwords do not match
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || isLoading"
        class="activeuser-btn"
        [class.opacity-50]="form.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Update Password</span>
        <div *ngIf="isLoading" class="spinner"></div>
        <span *ngIf="isLoading">Updating...</span>
      </button>
    </form>

    <div *ngIf="message" class="alert mt-4"
         [ngClass]="success ? 'alert-success' : 'alert-danger'">
      {{ message }}
    </div>

    <!-- Footer -->
    <p class="footer-text">
      &copy; 2026 STSGroupe. All rights reserved.
    </p>
  </div>
</div>
