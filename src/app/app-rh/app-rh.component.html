    <!-- Header -->

    <div class="header-body">
      <h1>Liste des Utilisateurs</h1>
      <button class="btn submit-btn" (click)="downloadApk()">
        <i class="fa fa-cloud-arrow-down"></i>
        STS RH Android
      </button>
      <button class="btn submit-btn" (click)="addUser()">
        <i class="fa fa-plus"></i>
        Ajouter Utilisateur
      </button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label for="filter-nom">Nom</label>
        <input type="text" id="filter-nom" [(ngModel)]="filterNom" placeholder="Filtrer par nom" (input)="applyFilters()">
      </div>
      <div class="filter-group">
        <label for="filter-role">Rôle</label>
        <select id="filter-role" [(ngModel)]="filterRole" (change)="applyFilters()">
          <option value="">Tous</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>
    </div>

    <!-- Table -->
    <div class="table-container">
      <table>
        <thead>
        <tr>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Email</th>
          <th>Téléphone</th>
          <th>Rôle</th>
          <th class="text-center">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let user of paginatedUsers">
          <td><strong>{{ user.nom }}</strong></td>
          <td>{{ user.prenom }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.telephone }}</td>
          <td>{{ user.role }}</td>
          <td class="actions">
            <button class="btn btn-view btn-sm" (click)="viewUser(user.id)">
              <i class="fa fa-eye"></i>
            </button>
            <button class="btn btn-warning btn-sm" (click)="viewUser(user.id)">
              <i class="fa fa-edit"></i>
            </button>
            <button class="btn btn-danger btn-sm" (click)="deleteUser(user.id)">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
        </tbody>
      </table>

      <!-- Pagination -->
      <div class="pagination" *ngIf="totalPages > 1">
        <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">
          <i class="fas fa-chevron-left"></i> Précédent
        </button>
        <ng-container *ngFor="let page of [].constructor(totalPages); let i = index">
          <button (click)="goToPage(i + 1)" [class.active]="currentPage === i + 1">{{ i + 1 }}</button>
        </ng-container>
        <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">
          Suivant <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>
    <div class="modern-table">
      <div class="table-container">
        <table>
          <thead>
          <tr>
            <th>Email</th>
            <th>Lien Activation</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let user of usersReg">
            <td><strong>{{ user.email }}</strong></td>
            <td>{{ user.path }}</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
<!-- Modal Add/Edit/View User -->
<app-user-modal
  *ngIf="showModal"
  [mode]="editingUser ? 'view' : 'add'"
  [user]="editingUser"
  [userType]="editingUser ? getUserTypeFromRole(editingUser.role) : 'chef projet'"
  (close)="closeModal()"
  (refresh)="loadUsers()">
</app-user-modal>
